name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skills:
    name: Validate SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # PyYAML gives the validator the same parser fidelity as the skills CLI.
      # It is a CI-only dependency; the engine itself stays stdlib-only.
      - run: pip install pyyaml
      - run: python3 scripts/validate_skills.py

  test:
    name: Engine tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        include:
          # README claims 3.8+; 3.8 is unavailable on ubuntu-latest images.
          - os: ubuntu-22.04
            python-version: '3.8'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run engine test suite
        run: python3 -m unittest discover taskforge-core/tests -v
      - name: Smoke-test the engine end to end
        run: |
          mkdir -p "$RUNNER_TEMP/smoke" && cd "$RUNNER_TEMP/smoke"
          S="$GITHUB_WORKSPACE/taskforge-core/scripts/tasks.py"
          python3 "$S" create --title smoke --description "ci smoke test"
          python3 "$S" doctor

  install:
    name: Install via the skills CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install skills from the working tree
        run: |
          mkdir -p target && cd target && git init -q -b main .
          npx -y skills@latest add "$GITHUB_WORKSPACE/source" \
            --agent claude-code --yes 2>&1 | tee install.log
      - name: Assert all five skills installed
        # The CLI skips an unparseable skill with a warning and still exits 0,
        # so the count is the assertion that matters.
        run: |
          cd target
          if grep -q "Skipped" install.log; then
            echo "::error::the skills CLI skipped a skill:"
            grep "Skipped" install.log
            exit 1
          fi
          count=$(ls .claude/skills 2>/dev/null | wc -l)
          echo "installed: $count"
          ls .claude/skills || true
          if [ "$count" -ne 5 ]; then
            echo "::error::expected 5 skills, found $count"
            exit 1
          fi
      - name: Run the engine from the installed location
        run: |
          cd target
          python3 .claude/skills/taskforge-core/scripts/tasks.py \
            create --title smoke --description "installed engine"
          python3 .claude/skills/taskforge-core/scripts/tasks.py doctor
